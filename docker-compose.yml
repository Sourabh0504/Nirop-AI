name: nirop-ai

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mailai
      POSTGRES_PASSWORD: mailai
      POSTGRES_DB: mailai
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6381:6379"

volumes:
  postgres_data:
